{
    // ============================================================
    // Configuração do Certora Prover
    // ============================================================
    // Este arquivo define os parâmetros para a verificação formal.
    //
    // Campos obrigatórios:
    //   files   — Lista de contratos a serem verificados
    //   verify  — Mapeamento "Contrato:spec" para verificação
    //
    // Campos opcionais comuns:
    //   solc              — Versão do compilador Solidity
    //   optimistic_loop   — Assume que loops terminam (default: false)
    //   loop_iter         — Número máximo de iterações de loop (default: 1)
    //   rule_sanity       — Verificação básica de sanidade (basic|none)
    //   msg               — Mensagem descritiva para o relatório
    // ============================================================

    "files": [
        "src/Contract.sol"
    ],

    "verify": "Contract:certora/specs/invariants.spec",

    "solc": "solc8.19",

    // Otimizações para lidar com loops
    "optimistic_loop": true,
    "loop_iter": 3,

    // Verificação de sanidade das regras
    "rule_sanity": "basic",

    // Mensagem descritiva
    "msg": "Verificacao formal dos invariantes do protocolo",

    // ============================================================
    // Configurações avançadas (opcionais)
    // ============================================================

    // Tempo limite por regra (em segundos)
    // "rule_timeout": 600,

    // Endereços simulados para testes
    // "solc_map": {
    //     "src/Contract.sol": "solc8.19"
    // },

    // Pacotes npm para dependências
    // "packages": ["@openzeppelin/contracts"],

    // Desabilitar otimizações do compilador
    // "optimize": 0
}
