[profile.dev]
# enable basic optimizations (otherwise reth can't process txs)
opt-level = 1

[profile.dev.package."*"]
# Compile all dependencies (but not workspace crates) with higher optimization.
# This significantly speeds up test execution for compute-heavy deps (crypto,
# hashing, EVM) while keeping workspace crate rebuild times fast for development.
opt-level = 2

[profile.release]
lto = "thin"
opt-level = 3 # maximize speed; use "z" if minimizing size
codegen-units = 1
strip = true

[profile.profiling]
inherits = "release"
debug = true
strip = false

[patch.crates-io]
# Fix for https://rustsec.org/advisories/RUSTSEC-2025-0055
# This version of `ark-relations` includes a fix for the issue,
# as it bumped `tracing-subscriber` to v0.3.0.
ark-relations = { git = "https://github.com/arkworks-rs/snark.git", rev = "9c528529763f1a0a2e0cba83528f93d32247d621" }
