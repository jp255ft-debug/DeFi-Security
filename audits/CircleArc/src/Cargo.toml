[workspace]
resolver = "2"

members = ["crates/*", "crates/test/checks", "crates/test/framework"]
exclude = ["crates/test"]

[workspace.package]
version      = "0.0.1"
edition      = "2024"
readme       = "README.md"
license      = "Apache-2.0"
exclude      = [".github/"]
rust-version = "1.91"
publish      = false
repository   = "https://github.com/circlefin/arc-node"

[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(coverage_nightly)'] }

[workspace.lints.clippy]
arithmetic_side_effects = "deny"
cast_possible_truncation = "deny"
collapsible_if = "allow"
unwrap_used = "deny"

[workspace.dependencies]

# eth
alloy-consensus = { version = "1.6.3", default-features = false }
alloy-eips = { version = "1.6.3", default-features = false }
alloy-evm = { version = "0.27.2", default-features = false }
alloy-genesis = { version = "1.6.3", default-features = false }

alloy-network = { version = "1.6.3", default-features = false }

# op
alloy-primitives = { version = "1.5.6", default-features = false, features = ["map-foldhash"] }
alloy-provider = { version = "1.6.3", features = ["reqwest"], default-features = false }
alloy-rlp = { version = "0.3.13", default-features = false, features = ["core-net"] }
alloy-rpc-types = { version = "1.6.3", features = ["eth"], default-features = false }
alloy-rpc-types-admin = { version = "1.6.3", default-features = false }
alloy-rpc-types-engine = { version = "1.6.3", default-features = false }
alloy-rpc-types-eth = { version = "1.6.3", default-features = false }
alloy-rpc-types-trace = { version = "1.6.3", default-features = false }
alloy-rpc-types-txpool = { version = "1.6.3", default-features = false }
alloy-serde = { version = "1.6.3", default-features = false }
alloy-signer = { version = "1.6.3", default-features = false }
alloy-signer-local = { version = "1.6.3", default-features = false, features = ["mnemonic"] }
alloy-sol-macro = "1.5.6"
alloy-sol-types = { version = "1.5.6", default-features = false }
alloy-transport-ws = { version = "1.6.3", default-features = false }
alloy-trie = { version = "0.9.4", default-features = false }

arbitrary = "1.3"

# internal crates
arc-checks = { version = "0.0.1", path = "crates/test/checks" }
arc-consensus-db = { version = "0.0.1", path = "crates/consensus-db" }
arc-consensus-types = { version = "0.0.1", path = "crates/types" }
arc-eth-engine = { version = "0.0.1", path = "crates/eth-engine" }
arc-evm = { version = "0.0.1", path = "crates/evm" }
arc-evm-node = { version = "0.0.1", path = "crates/evm-node" }
arc-execution-config = { version = "0.0.1", path = "crates/execution-config" }
arc-execution-payload = { version = "0.0.1", path = "crates/execution-payload" }
arc-execution-txpool = { version = "0.0.1", path = "crates/execution-txpool" }
arc-execution-validation = { version = "0.0.1", path = "crates/execution-validation" }
arc-mesh-analysis = { version = "0.0.1", path = "crates/mesh-analysis" }
arc-node-consensus = { version = "0.0.1", path = "crates/malachite-app" }
arc-node-consensus-cli = { version = "0.0.1", path = "crates/malachite-cli" }
arc-node-execution = { version = "0.0.1", path = "crates/node" }
arc-precompiles = { version = "0.0.1", path = "crates/precompiles" }
arc-remote-signer = { version = "0.0.1", path = "crates/remote-signer" }
arc-shared = { version = "0.0.1", path = "crates/shared" }
arc-signer = { version = "0.0.1", path = "crates/signer" }
arc-snapshots = { version = "0.0.1", path = "crates/snapshots" }
arc-test-framework = { version = "0.0.1", path = "crates/test/framework" }
arc-version = { version = "0.0.1", path = "crates/version" }

# async
async-trait = "0.1.68"
atomic-time = "0.1"
axum               = "0.8"
backon = { version = "1.5", default-features = false, features = ["std-blocking-sleep", "tokio-sleep"] }
base64             = "0.22.0"
bip32 = { version = "0.5.3", default-features = false, features = ["secp256k1", "std"] }
bip39 = { version = "2.2.0", default-features = false, features = ["std"] }

# arc
bon = "2.3.0"
bytes = { version = "1.5", default-features = false }
bytesize           = "1.3"

# for eip-4844
cc = "=1.2.15"
chrono = "0.4.44"
clap = "4"
clap-verbosity-flag = { version = "3.0.4", features = ["tracing"] }
color-eyre         = "0.6"
config             = { version = "0.14", features = ["toml"], default-features = false }
# TODO: When we build for a windows target on an ubuntu runner, crunchy tries to
# get the wrong path, update this when the workflow has been updated
#
# See: https://github.com/eira-fransham/crunchy/issues/13
crunchy = "=0.2.2"
csv = "1.4"
deranged = "0.5.5"
directories        = "5.0.1"

# p2p
dotenvy = "0.15"
ed25519-dalek = "2.0"
# misc
# crypto

# ssz encoding
ethereum_ssz = "0.9.0"
ethereum_ssz_derive = "0.9.0"
eyre = "0.6"
futures = "0.3"
futures-util = { version = "0.3", default-features = false }
hash-db = "=0.15.2"
hex = { version = "0.4.3", features = ["serde"] }

# http
humantime = "2.1"
humantime-serde = "1.1"
indexmap = "2"
itertools = "0.14"

# rpc
jsonrpsee = "0.26.0"
jsonrpsee-types = "0.26.0"
jsonwebtoken = "9.3.1"
k256 = { version = "0.13", default-features = false, features = ["ecdsa"] }
lz4 = "1.28.1"

# metrics
metrics = "0.24.0"
mockall = "0.14.0"
multihash = "0.19.3"
once_cell = { version = "1.19", default-features = false, features = ["critical-section"] }
oneline-eyre = "0.1"

# reth
parking_lot = "0.12"
plain_hasher = "0.2"

# proc-macros
proc-macro2 = "1.0"
prometheus-client = "0.23"
prometheus-parse = "0.2.5"
proptest = "1.7"
prost              = "0.13"
prost-build        = "0.13"
protox             = "0.8.0"
quote = "1.0"
