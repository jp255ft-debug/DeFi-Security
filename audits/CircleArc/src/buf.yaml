version: v2
modules:
  - path: crates/types/proto
    name: buf.build/arc/types
    lint:
      use:
        - STANDARD
      except:
        - ENUM_ZERO_VALUE_SUFFIX
    breaking:
      use:
        - FILE
  - path: crates/remote-signer/proto
    name: buf.build/arc/signer
    lint:
      use:
        - STANDARD
    breaking:
      use:
        - FILE
      ignore_only:
        # Allow changing/removing go_package; this repo generates Rust only (tonic), not Go.
        FILE_SAME_GO_PACKAGE:
          - crates/remote-signer/proto/arc/signer/v1/signer.proto
