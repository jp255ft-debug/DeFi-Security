#cloud-config
# For Amazon Linux 2023 (AL2023) - does NOT support apt/packages sections
hostname: cc
manage_etc_hosts: false
groups:
  - docker
users:
  - name: ${username}
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo,docker
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}
write_files:
  - path: /etc/exports
    owner: root:root
    permissions: "0644"
    content: |
      # NFS exports - share directory with all nodes in VPC
      /home/${username}/shared ${vpc_cidr}(rw,sync,no_subtree_check,no_root_squash)
  - path: /home/${username}/spammer.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/usr/bin/env bash
      docker run --rm --network host -u 0 -v $PWD:/work -w /work spammer:latest $@
  # SSH private key for CC to SSH to nodes (same key used by all instances)
  - path: /home/${username}/.ssh/id_rsa
    owner: root:root
    permissions: "0600"
    content: |
      ${indent(6, ssh_private_key)}
  # Parallel SSH script: executes the same command on multiple nodes in parallel
  - path: /home/${username}/pssh.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      # Usage: pssh.sh "command" ip1 ip2 ip3 ...
      # Executes command on all IPs in parallel, fails if any command fails.
      set -euo pipefail
      CMD="$1"
      shift
      SSH_OPTS="-o StrictHostKeyChecking=no -o LogLevel=ERROR"
      USER="${username}"
      TMPDIR=$(mktemp -d)
      trap "rm -rf $TMPDIR" EXIT
      i=0
      for IP in "$@"; do
          (ssh $SSH_OPTS $USER@$IP "$CMD"; echo $? > "$TMPDIR/$i") &
          i="$((i+1))"
      done
      wait
      FAILED=0
      for f in "$TMPDIR"/*; do
          [ -f "$f" ] && [ "$(cat "$f")" != "0" ] && FAILED=1
      done
      exit $FAILED
  - path: /home/${username}/download-metrics.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      # Usage: download-metrics.sh [-s <start_unix_ts>] [-e <end_unix_ts>] [-t <step>] [metric1 metric2 ...]
      # Queries Prometheus query_range and saves each metric to a JSON file,
      # then creates ~/quake-metrics-tmp-<pid>.tar.gz.
      # Outputs a single JSON line: {"archive":"<basename>","errors":["<metric>: <reason>",...]}
      # Per-metric failures are collected and reported; the archive is always created.
      # -t sets the query resolution (interval between data points, e.g. 30s, 1m, 5m).
      #    Defaults to ceil((end-start)/10000) to stay within Prometheus' 11,000-point limit.
      set -uo pipefail
      START=""
      END=""
      STEP=""
      while getopts "s:e:t:" OPT; do
        case "$OPT" in
          s) START="$OPTARG" ;;
          e) END="$OPTARG" ;;
          t) STEP="$OPTARG" ;;
          *) exit 1 ;;
        esac
      done
      shift "$((OPTIND-1))"
      NOW=$(date +%s)
      if [ -z "$START" ]; then
        START=$(curl -sf http://localhost:9090/api/v1/status/tsdb | jq -r '.data.headStats.minTime / 1000 | floor' 2>/dev/null) || START=0
      fi
      [ -z "$END" ] && END=$NOW
      if [ -z "$STEP" ]; then
        STEP=$(( (END - START + 9999) / 10000 ))
        [ "$STEP" -lt 1 ] && STEP=1
        STEP="$STEP"s
      fi
      PARAMS="start=$START&end=$END&step=$STEP"
      TMP_DIR=$(mktemp -d)
      trap "rm -rf $TMP_DIR" EXIT
      if [ $# -eq 0 ]; then
        METRICS_RESPONSE=$(curl -sf http://localhost:9090/api/v1/label/__name__/values)
        CURL_EXIT=$?
        if [ $CURL_EXIT -ne 0 ]; then
          printf '{"archive":"","errors":["failed to list Prometheus metric names (curl exited with code %s)"]}\n' "$CURL_EXIT"
          exit 0
        fi
        METRICS=$(printf '%s' "$METRICS_RESPONSE" | jq -r '.data[]')
      else
        METRICS=$(printf '%s\n' "$@")
      fi
      ARCHIVE="quake-metrics-tmp-$$.tar.gz"
      ERRORS=()
      while IFS= read -r M; do
        if RESPONSE=$(curl -s "http://localhost:9090/api/v1/query_range?query=$M&$PARAMS" 2>/dev/null); then
          STATUS=$(printf '%s' "$RESPONSE" | jq -r '.status // "error"' 2>/dev/null) || STATUS="error"
          if [ "$STATUS" = "success" ]; then
            printf '%s' "$RESPONSE" > "$TMP_DIR/$M.json"
          else
            ERR=$(printf '%s' "$RESPONSE" | jq -r '.error // "unknown error"' 2>/dev/null || echo "unknown error")
            ERRORS+=("$M: $ERR")
          fi
        else
          ERRORS+=("$M: curl failed")
        fi
      done <<< "$METRICS"
      tar czf ~/$ARCHIVE -C "$TMP_DIR" .
      if [ $${#ERRORS[@]} -eq 0 ]; then
        ERRORS_JSON="[]"
      else
        ERRORS_JSON=$(printf '%s\n' "$${ERRORS[@]}" | jq -R . | jq -s .)
      fi
      printf '{"archive":"%s","errors":%s}\n' "$ARCHIVE" "$ERRORS_JSON"
  - path: /home/${username}/download-db.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      # Usage: download-db.sh [-x] [-c] <ip1> [ip2 ...]
      # Archives node data from all specified nodes in parallel, then bundles
      # everything into ~/quake-db-tmp-<pid>.tar.gz.
      # Outputs a single JSON line: {"archive":"<basename>","errors":["<node>: <reason>",...]}
      # Per-node failures are collected and reported; the archive is always created.
      # -x: execution layer only (reth); -c: consensus layer only (malachite); default: both
      set -uo pipefail
      EXEC_ONLY=false
      CONS_ONLY=false
      while getopts "xc" OPT; do
        case "$OPT" in
          x) EXEC_ONLY=true ;;
          c) CONS_ONLY=true ;;
          *) exit 1 ;;
        esac
      done
      shift "$((OPTIND-1))"
      SSH_OPTS="-o StrictHostKeyChecking=accept-new -o LogLevel=ERROR -i ~/.ssh/id_rsa"
      USER="${username}"
      NODE_TMP=quake-db-node-tmp-$$.tar.gz
      if [ "$EXEC_ONLY" = true ]; then
        DIRS="~/data/reth"
      elif [ "$CONS_ONLY" = true ]; then
        DIRS="~/data/malachite"
      else
        DIRS="~/data/reth ~/data/malachite"
      fi
      ARCHIVE="quake-db-tmp-$$.tar.gz"
      TMP_DIR=$(mktemp -d)
      ALL_IPS="$*"
      ERRORS=()
      trap "rm -rf $TMP_DIR; ./pssh.sh 'rm -f ~/$NODE_TMP' $ALL_IPS 2>/dev/null || true" EXIT
      PSSH_OUTPUT=$(./pssh.sh "sudo tar czf ~/$NODE_TMP $DIRS" $ALL_IPS 2>&1)
      PSSH_EXIT=$?
      if [ $PSSH_EXIT -ne 0 ]; then
        PSSH_SUMMARY=$(printf '%s' "$PSSH_OUTPUT" | head -1)
        ERRORS+=("failed to archive node data (exit $PSSH_EXIT): $PSSH_SUMMARY")
      fi
      for IP in $ALL_IPS; do
        SCP_OUTPUT=$(scp $SSH_OPTS $USER@$IP:~/$NODE_TMP "$TMP_DIR/$IP.tar.gz" 2>&1)
        SCP_EXIT=$?
        if [ $SCP_EXIT -ne 0 ]; then
          SCP_SUMMARY=$(printf '%s' "$SCP_OUTPUT" | head -1)
          ERRORS+=("$IP: scp failed (exit $SCP_EXIT): $SCP_SUMMARY")
        fi
      done
      tar czf ~/$ARCHIVE -C "$TMP_DIR" .
      if [ $${#ERRORS[@]} -eq 0 ]; then
        ERRORS_JSON="[]"
      else
        ERRORS_JSON=$(printf '%s\n' "$${ERRORS[@]}" | jq -R . | jq -s .)
      fi
      printf '{"archive":"%s","errors":%s}\n' "$ARCHIVE" "$ERRORS_JSON"
runcmd:
# Set up 4 GiB swap to prevent hard OOM kills (dd instead of fallocate for XFS compatibility)
  - dd if=/dev/zero of=/swapfile bs=1M count=4096
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - echo '/swapfile none swap sw 0 0' >> /etc/fstab
# Tell the kernel to prefer killing containers (which hit their Docker memory limits) over heavy swapping
  - echo 'vm.swappiness=10' > /etc/sysctl.d/99-swap.conf
  - sysctl -p /etc/sysctl.d/99-swap.conf
# Install packages via dnf (Amazon Linux 2023)
# Note: curl-minimal, jq, nfs-utils, iproute are pre-installed
  - dnf install -y docker tmux
# Configure and start NFS server
  - mkdir -p /home/${username}/shared
  - chown ${username}:${username} /home/${username}/shared
  - chmod 755 /home/${username}/shared
  - ln -s /home/${username}/shared /shared
  - systemctl enable nfs-server
  - systemctl start nfs-server
  - exportfs -ra
# Install Docker Compose v2 plugin (not available in AL2023 repos)
  - mkdir -p /usr/local/lib/docker/cli-plugins
  - curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
# Create directories required by compose + quake
  - mkdir -p /home/${username}/monitoring/{config-prometheus,config-grafana,config-blockscout,blockscout/{logs,dets}}
  - mkdir -p /home/${username}/{rpc-proxy,pprof-proxy}
# Write monitoring secrets (base64 decoded to avoid YAML quoting issues)
  - echo '${blockscout_db_password_b64}' | base64 -d > /home/${username}/monitoring/blockscout_db_password
# Fix ownership of all generated assets
  - chown -R ${username}:${username} /home/${username}/
  - chown -R 1000:1000 /home/${username}/monitoring/blockscout/{logs,dets}
# Start docker service
  - systemctl start docker
  - systemctl enable docker
# Protect critical host processes from OOM killer (-1000 = never kill).
# Persists across SSM agent restarts via systemd drop-in.
  - mkdir -p /etc/systemd/system/amazon-ssm-agent.service.d
  - |
    cat > /etc/systemd/system/amazon-ssm-agent.service.d/oom.conf <<'DROPIN'
    [Service]
    OOMScoreAdjust=-1000
    DROPIN
  - systemctl daemon-reload
  - |
    for proc in amazon-ssm-agent ssm-agent-worker nfsd dockerd sshd; do
      pgrep -x "$$proc" | while read pid; do
        echo -1000 > /proc/$$pid/oom_score_adj
      done
    done
# Indicate that the server is ready for post-installation tasks.
  - date > /etc/done
# Pull images in parallel so that when the node instances are created, the images are ready to start
  - |
    docker pull nginx --quiet &
    docker pull grafana/grafana-oss --quiet &
    docker pull prom/prometheus --quiet &
    docker pull prom/node-exporter:latest --quiet &
    docker pull ghcr.io/blockscout/frontend:$${BLOCKSCOUT_FRONTEND_TAG:-latest} --quiet &
    docker pull ghcr.io/blockscout/$${BLOCKSCOUT_REPO:-blockscout}:$${BLOCKSCOUT_TAG:-latest} --quiet &
    docker pull postgres:17 --quiet &
    wait
    echo "docker images" && docker images
