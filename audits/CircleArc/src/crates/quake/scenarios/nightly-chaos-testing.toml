[nodes.validator-orange]
region = "eu-central-1"
cl_persistent_peers = ["validator-blue", "validator-green", "validator-purple", "validator-cyan", "validator-red", "validator-yellow", "validator-pink", "validator-grey", "validator-brown"]

[nodes.validator-yellow]
region = "eu-central-1"
cl_persistent_peers = ["validator-blue", "validator-green", "validator-purple", "validator-cyan", "validator-red", "validator-orange", "validator-pink", "validator-grey", "validator-brown"]

# ap-northeast-1 validators
