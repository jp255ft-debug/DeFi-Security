name = "nightly-upgrade"
description = "Nightly upgrade testing scenario with 5 validators. Tests rolling upgrade with configurable delay between stop and restart. Use 'quake wait rounds' after upgrades to verify consensus health."

# Use RPC connection for Engine API
engine_api_connection = "rpc"

# Starting versions (what the testnet begins with)
# IMAGE_REGISTRY_URL should be defined as an environment variable or in the .env file.
image_cl="${IMAGE_REGISTRY_URL}/arc-consensus:latest"
image_el="${IMAGE_REGISTRY_URL}/arc-execution:latest"

# Set the execution layer initial hardfork to the highest version supported by the image.
el_init_hardfork="zero4"

# Upgrade versions (what we upgrade to during the test)
image_cl_upgrade="arc_consensus:latest"
image_el_upgrade="arc_execution:latest"

# Global config
cl.config.log_level = "info"

# 5 validators ensures BFT consensus continues during single node upgrade
# Byzantine fault tolerance: f = (n-1)/3, so with 5 nodes we can tolerate 1 failure
[nodes.validator1]
[nodes.validator2]
[nodes.validator3]
[nodes.validator4]
[nodes.validator5]
