syntax = "proto3";

package arc.liveness.v1;

import "arc/consensus/v1/consensus.proto";

message PolkaSignature {
  // TODO: Add flag (no vote, nil, value?)
  arc.consensus.v1.Address validator_address = 1;
  arc.consensus.v1.Signature signature = 2;
}

message PolkaCertificate {
  uint64 height = 1;
  uint32 round = 2;
  arc.consensus.v1.ValueId value_id = 3;
  repeated PolkaSignature signatures = 4;
}

message RoundSignature {
  arc.consensus.v1.VoteType vote_type = 1;
  arc.consensus.v1.Address validator_address = 2;
  arc.consensus.v1.Signature signature = 3;
  // This is optional since a vote can be NIL.
  optional arc.consensus.v1.ValueId value_id = 4;
}

enum RoundCertificateType {
  ROUND_CERTIFICATE_TYPE_PRECOMMIT = 0;
  ROUND_CERTIFICATE_TYPE_SKIP = 1;
}

message RoundCertificate {
  uint64 height = 1;
  uint32 round = 2;
  RoundCertificateType cert_type = 3;
  repeated RoundSignature signatures = 4;
}

message LivenessMessage {
  oneof message {
    arc.consensus.v1.SignedMessage vote = 1;
    PolkaCertificate polka_certificate = 2;
    RoundCertificate round_certificate = 3;
  }
}
