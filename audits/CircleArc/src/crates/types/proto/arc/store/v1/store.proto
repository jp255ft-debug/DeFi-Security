syntax = "proto3";

package arc.store.v1;

import "arc/consensus/v1/consensus.proto";
import "arc/sync/v1/sync.proto";

message ProposalParts {
  arc.consensus.v1.ProposalInit init = 1;
  arc.consensus.v1.ProposalFin fin = 2;
  repeated arc.consensus.v1.ProposalData data = 3;
}

message CommitCertificate {
  uint64 height = 1;
  uint32 round = 2;
  arc.consensus.v1.ValueId value_id = 3;
  repeated arc.sync.v1.CommitSignature signatures = 4;
  optional arc.consensus.v1.Address proposer = 5;
  optional bool extended = 6;
}

// A pair of conflicting votes from the same validator (vote equivocation evidence)
message DoubleVote {
  arc.consensus.v1.SignedMessage first = 1;
  arc.consensus.v1.SignedMessage second = 2;
}

// A pair of conflicting proposals from the same validator (proposal equivocation evidence)
message DoubleProposal {
  arc.consensus.v1.SignedMessage first = 1;
  arc.consensus.v1.SignedMessage second = 2;
}

// Equivocation evidence for a single validator
message ValidatorEvidence {
  arc.consensus.v1.Address address = 1;
  repeated DoubleVote double_votes = 2;
  repeated DoubleProposal double_proposals = 3;
}

// Misbehavior evidence collected during a height
message MisbehaviorEvidence {
  uint64 height = 1;
  repeated ValidatorEvidence validators = 2;
}

// Proposal monitoring data for tracking round-0 proposal timing and success
message ProposalMonitorData {
  uint64 height = 1;
  arc.consensus.v1.Address proposer = 2;
  // Start time in milliseconds since UNIX epoch (0 if not available)
  uint64 start_time_ms = 3;
  // Proposal receive time in milliseconds since UNIX epoch (0 if not received)
  uint64 receive_time_ms = 4;
  // The value ID of the round-0 proposal (empty if not received)
  bytes value_id = 5;
  // Whether the round-0 proposal was finalized (0 = unknown/not decided, 1 = not successful, 2 = successful)
  uint32 successful_state = 6;
  // Whether this height was synced (decision came from sync, not consensus participation)
  bool synced = 7;
}

// An invalid proposal that was submitted to the network.
message InvalidPayload {
  uint64 height = 1;
  uint32 round = 2;
  arc.consensus.v1.Address proposer_address = 3;
  optional bytes payload = 4;
  string reason = 5;
}

// Invalid payloads collected during a height
message InvalidPayloads {
  uint64 height = 1;
  repeated InvalidPayload payloads = 2;
}
