[profile.default]
src = 'src'
out = 'out'
libs = ['lib']
solc = "0.8.19"
ffi = true

# RPC endpoints para fork da mainnet
# Configure sua chave de API no .env ou use um RPC público
# Opções gratuitas (sem cadastro):
#   - https://ethereum-rpc.publicnode.com
#   - https://rpc.ankr.com/eth
#   - https://eth.drpc.org
#
# Opções com cadastro grátis:
#   - Alchemy: https://eth-mainnet.g.alchemy.com/v2/SUA_KEY
#   - Infura:  https://mainnet.infura.io/v3/SUA_KEY
#
# Uso: forge test --fork-url <RPC_URL> -vvvv
# Exemplo: forge test --fork-url https://ethereum-rpc.publicnode.com -vvvv

# See more config options https://github.com/foundry-rs/foundry/tree/master/config
