[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
local = "http://localhost:8545"
hyperevm_mainnet = "https://rpc.hyperliquid.xyz/evm"
hyper_test = "https://rpc.hyperliquid-testnet.xyz/evm"
