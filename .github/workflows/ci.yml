# ============================================================
# DeFi Security CI — Pipeline de Qualidade e Segurança
# ============================================================
# Executa análise estática, validação de PoCs e checagem
# de conectores DePIN a cada push na main.
# ============================================================

name: DeFi Security CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Análise Estática ──────────────────────────────────────
  static-analysis:
    name: Static Analysis (Slither)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither on DePIN contracts
        run: |
          slither depin/contracts/ --json slither_depin_report.json || true
          echo "✅ Slither concluído"

  # ── Validação de PoCs (Foundry) ───────────────────────────
  foundry-build:
    name: Foundry Build (PoCs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build src/ contracts
        run: |
          cd src && forge build --sizes

      - name: Build LayerZero PoC
        run: |
          cd audits/LayerZero/poc && forge build --sizes || echo "⚠️ LayerZero PoC build falhou (pode ser dependência externa)"

      - name: Build Moonwell PoC
        run: |
          cd audits/Moonwell/poc && forge build --sizes || echo "⚠️ Moonwell PoC build falhou (pode ser dependência externa)"

      - name: Build Ripio PoC
        run: |
          cd audits/Ripio/poc && forge build --sizes || echo "⚠️ Ripio PoC build falhou (pode ser dependência externa)"

  # ── Validação DePIN ───────────────────────────────────────
  depin-validation:
    name: DePIN Connectors Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_depin.txt

      - name: Validate DePIN scripts (syntax check)
        run: |
          python -m py_compile depin/connectors/*.py
          python -m py_compile depin/contracts/test/*.t.sol 2>/dev/null || true
          echo "✅ Todos os conectores DePIN validados"

      - name: Run Quantum Detector on DePIN
        run: |
          python scripts/quantum_detector.py depin/ || echo "⚠️ Quantum detector report gerado"

  # ── Verificação de Scripts ────────────────────────────────
  scripts-validation:
    name: Scripts & Tools Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python scripts
        run: |
          python -m py_compile scripts/*.py
          echo "✅ Todos os scripts Python validados"

      - name: Check shell scripts syntax
        run: |
          for f in scripts/*.sh; do
            bash -n "$f" && echo "  ✅ $f" || echo "  ⚠️ $f"
          done
