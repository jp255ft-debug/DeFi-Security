# ============================================================
# DeFi Security Workspace — Pre-commit Hooks
# ============================================================
# Instalação: pre-commit install
# Executar manualmente: pre-commit run --all-files
# ============================================================

repos:
  # ── Hooks Padrão ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  # ── Segurança ─────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '\.env\.example$|\.gitignore$'

  # ── Python ────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 23.12.0
    hooks:
      - id: black
        args: [--line-length=100]
        files: '\.py$'

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]
        files: '\.py$'

  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --ignore=E203,W503]
        files: '\.py$'
        additional_dependencies: [flake8-docstrings]

  # ── Shell Scripts ─────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        files: '\.sh$'

  # ── Segurança Customizada ─────────────────────────────────
  - repo: local
    hooks:
      - id: security-check
        name: Security Pre-Commit Check
        entry: bash scripts/pre_commit_security_check.sh
        language: system
        pass_filenames: false
        always_run: true
